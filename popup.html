<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <title>Zen Styles for Notion</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Palette Pro</h1>
      <p>Premium Notion themes.</p>
    </header>

    <main class="themes-grid">
      <button class="theme-btn" data-theme="default">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#f9f8f7;"></div>
          <div class="preview-main" style="background:#ffffff;"></div>
        </div>
        <span>Default</span>
      </button>

      <!-- Dark Themes -->
      <button class="theme-btn" data-theme="nord">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#272c36;"></div>
          <div class="preview-main" style="background:#2e3440;"></div>
        </div>
        <span>Nord</span>
      </button>

      <button class="theme-btn" data-theme="tokyo">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#16161e;"></div>
          <div class="preview-main" style="background:#1a1b26;"></div>
        </div>
        <span>Tokyo Night</span>
      </button>

      <button class="theme-btn" data-theme="midnight">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#0B1120;"></div>
          <div class="preview-main" style="background:#0F172A;"></div>
        </div>
        <span>Midnight</span>
      </button>

      <button class="theme-btn" data-theme="dracula">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#21222c;"></div>
          <div class="preview-main" style="background:#282a36;"></div>
        </div>
        <span>Dracula</span>
      </button>

      <button class="theme-btn" data-theme="solarized">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#00212b;"></div>
          <div class="preview-main" style="background:#002b36;"></div>
        </div>
        <span>Solarized</span>
      </button>

      <button class="theme-btn" data-theme="rose">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#1f1d2e;"></div>
          <div class="preview-main" style="background:#191724;"></div>
        </div>
        <span>Rosé Pine</span>
      </button>

      <button class="theme-btn" data-theme="catppuccin">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#181825;"></div>
          <div class="preview-main" style="background:#1e1e2e;"></div>
        </div>
        <span>Catppuccin</span>
      </button>

      <button class="theme-btn" data-theme="onedark">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#21252b;"></div>
          <div class="preview-main" style="background:#282c34;"></div>
        </div>
        <span>One Dark</span>
      </button>

      <button class="theme-btn" data-theme="everforest">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#272e33;"></div>
          <div class="preview-main" style="background:#2d353b;"></div>
        </div>
        <span>Everforest</span>
      </button>

      <!-- Light Themes -->
      <button class="theme-btn" data-theme="sepia">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#F4E8D1;"></div>
          <div class="preview-main" style="background:#FDF6E3;"></div>
        </div>
        <span>Sepia</span>
      </button>

      <button class="theme-btn" data-theme="gray">
        <div class="theme-preview">
          <div class="preview-sidebar" style="background:#F3F4F6;"></div>
          <div class="preview-main" style="background:#F9FAFB;"></div>
        </div>
        <span>Clean Gray</span>
      </button>
    </main>

    <footer class="footer">
      <p id="status-msg">Changes apply instantly</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
